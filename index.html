<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-BackCare | منصة تأهيل الظهر الذكية</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --danger: #f43f5e; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--primary); color: white; margin: 0; }
        
        .page { display: none; padding: 20px; max-width: 800px; margin: auto; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; }
        h2 { color: var(--accent); text-align: center; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { width: 100%; background: var(--accent); color: var(--primary); padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0ea5e9; }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--accent); transform: scale(1.03); }

        .video-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        #video-input { width: 100%; height: auto; transform: scaleX(-1); opacity: 0.8; }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.8); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--accent); white-space: nowrap; }
        .stats-panel { display: flex; gap: 10px; margin-top: 15px; }
        .stat { flex: 1; background: var(--card); padding: 15px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

<div id="page-intake" class="page active">
    <div class="card">
        <h2>🛡️ تشخيص آلام الظهر</h2>
        <p style="text-align:center;">أدخل بياناتك لتخصيص خطة التمارين</p>
        <input type="text" id="user-name" placeholder="الاسم">
        <select id="back-condition">
            <option value="">حدد حالة الظهر...</option>
            <option value="disc">انزلاق غضروفي (Disc Prolapse)</option>
            <option value="sciatica">عرق النسا (Sciatica)</option>
            <option value="stiffness">تيبس الفقرات / خشونة</option>
            <option value="post-op">تأهيل ما بعد الجراحة</option>
        </select>
        <textarea placeholder="وصف الألم (مثلاً: ألم في أسفل الظهر يمتد للرجل)"></textarea>
        <button onclick="nav('page-menu')">متابعة التمارين ←</button>
    </div>
</div>

<div id="page-menu" class="page">
    <h2>🎯 تمارين العمود الفقري</h2>
    <div class="grid-menu">
        <div class="menu-item" onclick="startEx('catcow')">🐈🐄<br>تمرين القطة (Cat-Cow)<br><small>لمرونة الفقرات</small></div>
        <div class="menu-item" onclick="startEx('birddog')">🐕🕊️<br>تمرين الطائر (Bird-Dog)<br><small>لاستقرار الجذع</small></div>
        <div class="menu-item" onclick="startEx('bridge')">🌉<br>تمرين الجسر (Bridge)<br><small>لتقوية أسفل الظهر</small></div>
        <div class="menu-item" onclick="alert('قريباً: تمارين الإطالة الجانبية')">🧘<br>إطالات متقدمة</div>
    </div>
</div>

<div id="page-monitor" class="page">
    <div class="card" style="padding:10px;">
        <h3 id="ex-name" style="text-align:center; color:var(--accent);">تمرين الظهر</h3>
        <div class="video-box">
            <div id="hud" class="hud">جاري معايرة العمود الفقري...</div>
            <video id="video-input"></video>
            <canvas id="output-canvas"></canvas>
        </div>
        <div class="stats-panel">
            <div class="stat">العداد: <b id="count">0</b></div>
            <div class="stat">زاوية الفقرات: <b id="angle">0°</b></div>
        </div>
        <button style="background:var(--danger); margin-top:15px;" onclick="location.reload()">إنهاء التمرين</button>
    </div>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    let currentEx = ''; let counter = 0; let stage = null;

    function startEx(type) {
        currentEx = type;
        document.getElementById('ex-name').innerText = type.toUpperCase();
        nav('page-monitor');
        initAI();
    }

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let ang = Math.abs(r * 180.0 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }

    const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        const ctx = canvasCtx;
        ctx.save();
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 3});
        
        const lm = res.poseLandmarks;
        const hud = document.getElementById('hud');
        let angle = 0;

        // خوارزمية تتبع استقامة العمود الفقري (بين الكتف والحوض)
        let spineAlignment = Math.abs(lm[11].y - lm[12].y);
        if (spineAlignment > 0.08) {
            hud.innerText = "⚠️ انتبه: ظهرك غير متوازن!";
            hud.style.color = "red";
        } else {
            hud.style.color = "white";

            if (currentEx === 'catcow') {
                angle = calculateAngle(lm[11], lm[23], lm[25]); // زاوية الظهر/الحوض
                if (angle > 160) stage = "arch";
                if (angle < 130 && stage === "arch") { stage = "curl"; counter++; }
                hud.innerText = stage === "arch" ? "اخفض ظهرك للأسفل ⬇️" : "ارفع ظهرك للأعلى ⬆️";
            } 
            else if (currentEx === 'bridge') {
                angle = calculateAngle(lm[11], lm[23], lm[25]); // زاوية الحوض
                if (angle < 140) stage = "down";
                if (angle > 170 && stage === "down") { stage = "up"; counter++; }
                hud.innerText = "ارفع الحوض للأعلى ⬆️";
            }
        }

        document.getElementById('angle').innerText = Math.round(angle) + "°";
        document.getElementById('count').innerText = counter;
        ctx.restore();
    });

    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function initAI() {
        new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        }).start();
    }
</script>
</body>
</html>
