<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movement Analytics - Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #f43f5e; --success: #10b981; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; }
        
        /* واجهة التحليل */
        .analytics-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-top: 15px; }
        
        .video-container { position: relative; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #334155; }
        #video-input { width: 100%; height: auto; transform: scaleX(-1); opacity: 0.8; }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border-left: 5px solid var(--accent); }
        .stat-val { font-size: 2rem; font-weight: 800; display: block; color: var(--accent); }

        /* شريط التغذية الراجعة الذكي */
        #feedback-hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; border-radius: 50px; font-weight: bold;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--accent); white-space: nowrap; transition: 0.3s;
        }

        .warning { border-color: var(--danger) !important; color: var(--danger); animation: shake 0.5s; }
        
        @keyframes shake { 0%, 100% { transform: translateX(-50%); } 25% { transform: translateX(-55%); } 75% { transform: translateX(-45%); } }

        /* شريط التقدم */
        .progress-bar { width: 100%; height: 10px; background: #334155; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--success); transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right; padding: 10px;">
        <h1 style="margin:0; font-size: 1.5rem;">📊 Movement Analytics <span style="color:var(--accent)">3D Pro</span></h1>
        <p style="color: #94a3b8; font-size: 0.9rem;">نظام تحليل المسار الحركي المدعوم بالذكاء الاصطناعي</p>
    </div>

    <div class="video-container">
        <div id="feedback-hud">جاري معايرة الحساسات...</div>
        <video id="video-input"></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div class="analytics-grid">
        <div class="sidebar">
            <div class="stat-card">
                <span style="font-size: 0.8rem;">دقة المسار (Accuracy)</span>
                <span id="accuracy-val" class="stat-val">0%</span>
            </div>
            <div class="stat-card">
                <span style="font-size: 0.8rem;">الزاوية (Angle)</span>
                <span id="angle-val" class="stat-val">0°</span>
            </div>
        </div>
        <div class="sidebar">
            <div class="stat-card" style="border-color: var(--success);">
                <span style="font-size: 0.8rem;">التكرارات</span>
                <span id="counter" class="stat-val">0</span>
            </div>
            <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:15px; cursor:pointer;">إعادة تعيين</button>
        </div>
    </div>

    <div class="progress-bar"><div id="progress-fill"></div></div>
</div>

<script>
    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let counter = 0;
    let stage = null;
    let goal = 10; // الهدف اليومي

    function calculateAngle(a, b, c) {
        let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360 - angle;
        return angle;
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        if (!results.poseLandmarks) return;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // رسم هيكل شبكي احترافي
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ffffff', radius: 1});

        const lm = results.poseLandmarks;
        const hud = document.getElementById('feedback-hud');
        
        // التحليل: تمرين الذراع كمثال متقدم
        let angle = calculateAngle(lm[12], lm[14], lm[16]);
        document.getElementById('angle-val').innerText = Math.round(angle) + "°";

        // 🚨 منطق "نطاق الأمان" (Safe Zone Analytics)
        if (angle > 165) {
            stage = "down";
            hud.innerText = "وضعية سليمة - اثنِ الآن";
            hud.className = "";
        }
        
        // تنبيه إذا كانت الحركة سريعة جداً أو خاطئة
        if (angle < 40 && stage === "down") {
            stage = "up";
            counter++;
            document.getElementById('counter').innerText = counter;
            document.getElementById('progress-fill').style.width = (counter/goal * 100) + "%";
            hud.innerText = "تم التحليل بنجاح ✅";
            hud.className = "";
        }

        // تحذير من "التعويض الحركي" (مثلاً ميلان الظهر أثناء التمرين)
        let spineAngle = calculateAngle(lm[11], lm[12], lm[24]); 
        if (spineAngle < 80) {
            hud.innerText = "⚠️ حذارِ: حافظ على استقامة ظهرك!";
            hud.className = "warning";
            document.getElementById('accuracy-val').innerText = "تدني الدقة!";
        } else {
            document.getElementById('accuracy-val').innerText = "98%";
        }

        canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();

    videoElement.addEventListener('loadedmetadata', () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
    });
</script>
</body>
</html>
