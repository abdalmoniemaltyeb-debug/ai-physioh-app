<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI-Spine Medical Platform | منصة تأهيل الظهر المتكاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --success: #10b981; --danger: #f43f5e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--primary); color: white; margin: 0; padding: 15px; }
        .page { display: none; max-width: 800px; margin: auto; animation: fadeIn 0.4s; }
        .active { display: block; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #475569; }
        button { background: var(--accent); color: var(--primary); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .video-box { position: relative; border-radius: 20px; overflow: hidden; background: #000; line-height: 0; }
        #video-input { width: 100%; height: auto; transform: scaleX(-1); } /* مراة */
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hud { position: absolute; top: 15px; width: 90%; left: 5%; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="p-diag" class="page active">
        <div class="card">
            <h2>📝 شيت تقييم حالة الظهر</h2>
            <p>أجب عن الأسئلة التالية ليقوم النظام بتحديد بروتوكولك العلاجي:</p>
            <label>أين يتركز الألم الأكبر؟</label>
            <select id="q1">
                <option value="back">أسفل الظهر فقط</option>
                <option value="leg">يمتد للأرجل (عرق نسا)</option>
            </select>
            <label>متى يزداد الألم؟</label>
            <select id="q2">
                <option value="flex">عند الانحناء للأمام</option>
                <option value="ext">عند الوقوف أو فرد الظهر</option>
            </select>
            <label>هل تشعر بتنميل أو خدر؟</label>
            <select id="q3">
                <option value="yes">نعم</option>
                <option value="no">لا</option>
            </select>
            <button onclick="analyzeCondition()">تحليل الحالة وتحديد التمارين ←</button>
        </div>
    </div>

    <div id="p-lib" class="page">
        <div class="card">
            <h2 id="diag-result">النتيجة: انزلاق غضروفي</h2>
            <div id="exercise-list"></div>
            <button onclick="startExercise()">ابدأ التمرين الحي 🎥</button>
        </div>
    </div>

    <div id="p-run" class="page">
        <div class="video-box">
            <div id="hud" class="hud">جاري تحليل الوضعية الجانبية...</div>
            <video id="video-input"></video>
            <canvas id="output-canvas"></canvas>
        </div>
        <div class="report-grid">
            <div class="card" style="text-align:center">العداد: <b id="count">0</b></div>
            <div class="card" style="text-align:center">الدقة: <b id="acc">100%</b></div>
        </div>
        <button style="background:var(--danger)" onclick="showFeedback()">إنهاء وجلب التقرير</button>
    </div>

    <div id="p-feed" class="page">
        <div class="card">
            <h2>📊 تقرير أداء الجلسة</h2>
            <div id="feedback-content" style="line-height: 1.8;"></div>
            <button onclick="location.reload()">جلسة جديدة</button>
        </div>
    </div>
</div>

<script>
    let userCondition = '';
    let counter = 0;
    let mistakes = 0;

    const protocols = {
        'disc': { 
            title: 'بروتوكول الانزلاق الغضروفي', 
            exercises: ['McKenzie Extension', 'Superman Pose', 'Prone Cobra'],
            tips: 'ركز على فرد الظهر وتجنب الانحناء الأمامي.' 
        },
        'stenosis': { 
            title: 'بروتوكول تضيق القناة', 
            exercises: ['Pelvic Tilts', 'Knee to Chest', 'Child Pose'],
            tips: 'تمارين الثني تريح القناة العصبية.' 
        }
    };

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function analyzeCondition() {
        const q1 = document.getElementById('q1').value;
        const q2 = document.getElementById('q2').value;
        
        // منطق التحديد التلقائي
        userCondition = (q2 === 'flex') ? 'disc' : 'stenosis';
        
        document.getElementById('diag-result').innerText = protocols[userCondition].title;
        const list = document.getElementById('exercise-list');
        list.innerHTML = protocols[userCondition].exercises.map(ex => `<div style="background:#334155; padding:10px; margin:5px 0; border-radius:10px;">✅ ${ex}</div>`).join('');
        nav('p-lib');
    }

    function startExercise() { nav('p-run'); initAI(); }

    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({modelComplexity: 0, minDetectionConfidence: 0.5});

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        drawConnectors(canvasCtx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});
        
        const lm = res.poseLandmarks;
        const hud = document.getElementById('hud');
        // 1. إعدادات السرعة القصوى لـ Mediapipe
const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});

pose.setOptions({
    modelComplexity: 0,       // 0 هو الأسرع (Lite Model)
    smoothLandmarks: false,   // إيقاف التنعيم يقلل العمليات الحسابية
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});

// 2. منطق تقليل الإطارات (Frame Throttling)
let lastFrameTime = 0;
const targetFPS = 15; // 15 إطار في الثانية كافية جداً للعلاج الطبيعي وسلسة جداً

async function onFrame() {
    const now = performance.now();
    if (now - lastFrameTime < (1000 / targetFPS)) {
        requestAnimationFrame(onFrame);
        return;
    }
    lastFrameTime = now;
    await pose.send({image: videoElement});
    requestAnimationFrame(onFrame);
}

// 3. تعديل حجم الكاميرا
function initAI() {
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            // استدعاء دالة المعالجة المحسنة
            await pose.send({image: videoElement});
        },
        width: 320, // تصغير الحجم يجعل المعالجة لحظية
        height: 240
    });
    camera.start();
}

        // تصحيح المتحسس الجانبي: نتحقق من الجانب الظاهر للكاميرا (يمين أو يسار)
        // إذا كانت النقطة 12 (كتف) أوضح من 11، نستخدم الجانب الأيمن، والعكس.
        const side = lm[12].visibility > lm[11].visibility ? {s:12, h:24, k:26} : {s:11, h:23, k:25};
        
        let ang = calculateAngle(lm[side.s], lm[side.h], lm[side.k]);
        document.getElementById('acc').innerText = Math.round(ang) + "°";

        if (userCondition === 'disc' && ang < 145) {
            hud.innerText = "🚨 خطأ: لا تنحنِ للأمام! حافظ على استقامة الظهر";
            hud.style.color = "red";
            mistakes++;
        } else {
            hud.innerText = "أداء سليم - واصل التمرين ✅";
            hud.style.color = "#38bdf8";
            // منطق العداد
            if (ang > 170) stage = "down";
            if (ang < 160 && stage === "down") { stage = "up"; counter++; document.getElementById('count').innerText = counter; }
        }
    });

    function showFeedback() {
        const content = document.getElementById('feedback-content');
        const score = counter > 0 ? Math.round(((counter - mistakes/10) / counter) * 100) : 0;
        content.innerHTML = `
            <p><b>عدد التكرارات الصحيحة:</b> ${counter}</p>
            <p><b>عدد الأخطاء المرصودة:</b> ${mistakes}</p>
            <p><b>نسبة دقة الأداء:</b> ${Math.max(score, 0)}%</p>
            <hr>
            <p style="color:var(--accent)"><b>نصيحة الأخصائي الذكي:</b> ${protocols[userCondition].tips}</p>
        `;
        nav('p-feed');
    }

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
        let ang = Math.abs(r * 180 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }

    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function initAI() {
        new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 480, height: 360
        }).start();
    }
</script>
</body>
</html>
