<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراقب التمارين الذكي - نسخة متطورة</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        #video-input { width: 100%; height: auto; transform: scaleX(-1); }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: #e8f4fd; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-value { display: block; font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        
        #feedback-box { 
            margin-top: 15px; padding: 15px; border-radius: 12px; 
            font-weight: bold; font-size: 1.2rem; transition: 0.3s;
            background: #f8f9fa; border: 2px solid #dee2e6;
        }
        .correct { background: #d4edda !important; color: #155724; border-color: #c3e6cb !important; }
        .alert { background: #fff3cd !important; color: #856404; border-color: #ffeeba !important; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #2c3e50;">🤖 نظام التوجيه الذكي</h2>
    
    <div class="video-wrapper">
        <video id="video-input"></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <span>عدد التكرارات</span>
            <span id="counter" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span>الزاوية الحالية</span>
            <span id="angle-display" class="stat-value">0°</span>
        </div>
    </div>

    <div id="feedback-box">💡 قف بوضوح لبدء التمرين...</div>
</div>

<script>
    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const counterDisplay = document.getElementById('counter');
    const angleDisplay = document.getElementById('angle-display');
    const feedbackBox = document.getElementById('feedback-box');

    let counter = 0;
    let stage = null; // حالة التمرين: 'down' أو 'up'

    // دالة حساب الزاوية بين ثلاث نقاط
    function calculateAngle(a, b, c) {
        let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360 - angle;
        return angle;
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        if (!results.poseLandmarks) return;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', radius: 1});

        // الحصول على نقاط الذراع الأيمن (الكتف 12، المرفق 14، المعصم 16)
        const landmarks = results.poseLandmarks;
        const shoulder = landmarks[12];
        const elbow = landmarks[14];
        const wrist = landmarks[16];

        // حساب الزاوية
        const angle = calculateAngle(shoulder, elbow, wrist);
        angleDisplay.innerText = Math.round(angle) + "°";

        // منطق العداد والتغذية الراجعة
        if (angle > 160) {
            stage = "down";
            feedbackBox.innerText = "💪 ممتاز! الآن اثنِ ذراعك للأعلى";
            feedbackBox.className = "alert";
        }
        if (angle < 30 && stage === "down") {
            stage = "up";
            counter++;
            counterDisplay.innerText = counter;
            feedbackBox.innerText = "✅ حركة صحيحة! استمر";
            feedbackBox.className = "correct";
        }

        canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();

    videoElement.addEventListener('loadedmetadata', () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
    });
</script>
</body>
</html>
