<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التأهيل الذكي - تشغيل فوري</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --primary: #0ea5e9; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        
        /* نسق الكاميرا الاحترافي */
        .camera-card { 
            position: relative; width: 100%; aspect-ratio: 3/4; 
            background: #000; border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 4px solid white;
        }
        #video-input { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        /* لوحة البيانات */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: white; padding: 15px; border-radius: 20px; text-align: center; }
        .val { display: block; font-size: 2rem; font-weight: bold; color: var(--primary); }

        /* صندوق التعليمات (مثل الصورة) */
        #instruction-box { 
            background: #fef9c3; color: #854d0e; padding: 20px; border-radius: 20px; 
            margin-top: 15px; text-align: center; font-weight: bold; border: 1px solid #fde68a;
        }
        
        #guide-text { background: white; padding: 15px; border-radius: 20px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <div class="stat-item">
            <h2>مرحباً دكتور عبد المنعم 🦾</h2>
            <p>اختر نوع التمرين لبدء الرصد الآلي:</p>
            <select id="ex-type" style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px;">
                <option value="neck">تمارين الرقبة (Neck Retraction)</option>
                <option value="back">تمارين أعلى الظهر (Scapular)</option>
                <option value="shoulder">تمارين الكتف (Wall Climbing)</option>
            </select>
            <button class="btn-main" onclick="init()">بدء الكاميرا الآن</button>
        </div>
    </div>

    <div id="active-workout" style="display:none;">
        <div class="camera-card">
            <video id="video-input" autoplay playsinline></video>
            <canvas id="output-canvas"></canvas>
        </div>

        <div class="stats">
            <div class="stat-item"><span>العدات</span><span id="counter" class="val">0</span></div>
            <div class="stat-item"><span>الزاوية</span><span id="angle" class="val">0°</span></div>
        </div>

        <div id="instruction-box">💡 قف بوضوح أمام الكاميرا...</div>
        
        <div id="guide-text">
            <b id="guide-title"></b>: <span id="guide-desc"></span>
        </div>
    </div>
</div>

<script>
    const exercises = {
        neck: { t: "سحب الذقن", d: "اسحب ذقنك للخلف (Double Chin) بدون خفض الرأس.", msg: "ارفع ذقنك واسحب للخلف" },
        back: { t: "ضم الكتف", d: "اسحب لوحي الكتف للخلف كأنك تغلق سوستة الظهر.", msg: "افرد ظهرك وضم الكتفين" },
        shoulder: { t: "تسلق الحائط", d: "ارفع يدك على الحائط تدريجياً ببطء.", msg: "ارفع يدك للأعلى" }
    };

    let count = 0, stage = "up", synth = window.speechSynthesis;

    function speak(t) { if(!synth.speaking) { let u = new SpeechSynthesisUtterance(t); u.lang='ar-SA'; synth.speak(u); } }

    async function init() {
        const type = document.getElementById('ex-type').value;
        document.getElementById('guide-title').innerText = exercises[type].t;
        document.getElementById('guide-desc').innerText = exercises[type].d;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('active-workout').style.display = 'block';

        const video = document.getElementById('video-input');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');

        const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((res) => {
            if (!res.poseLandmarks) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#0ea5e9', lineWidth: 3});

            const lm = res.poseLandmarks;
            // حساب زاوية الجذع (كتف - حوض - ركبة)
            const ang = calculateAngle(lm[11], lm[23], lm[25]);
            document.getElementById('angle').innerText = Math.round(ang) + "°";

            // منطق العد التلقائي
            if (ang < 160) {
                if (stage === "up") {
                    document.getElementById('instruction-box').innerText = "ممتاز! استمر في الحركة";
                    document.getElementById('instruction-box').style.background = "#dcfce7";
                    stage = "down";
                }
            }
            if (ang > 175 && stage === "down") {
                count++;
                document.getElementById('counter').innerText = count;
                document.getElementById('instruction-box').innerText = "✅ رائعة! عدة مكتملة";
                document.getElementById('instruction-box').style.background = "#fef9c3";
                speak(count.toString());
                stage = "up";
            }
        });

        const camera = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 640, height: 480 });
        camera.start();
    }

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
        let ang = Math.abs(r * 180 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }
</script>
</body>
</html>
