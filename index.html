<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Spine Pro | نظام تأهيل الظهر الاحترافي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --danger: #f43f5e; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: white; margin: 0; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 15px; }
        button { background: var(--accent); color: var(--primary); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .video-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        #video-input { width: 100%; height: auto; transform: scaleX(-1); }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hud { position: absolute; top: 10px; width: 90%; left: 5%; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; font-size: 0.9rem; }
        .lib-item { background: #334155; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--accent); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p1" class="page active">
    <div class="card">
        <h2>🛡️ تشخيص حالة الظهر</h2>
        <select id="back-type" style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px;">
            <option value="disc">انزلاق غضروفي (Disc)</option>
            <option value="stenosis">تضيق القناة (Stenosis)</option>
            <option value="sciatica">عرق النسا (Sciatica)</option>
            <option value="strain">شد عضلي (Strain)</option>
        </select>
        <button onclick="showLibrary()">عرض المرجع والخطة ←</button>
    </div>
</div>

<div id="p2" class="page">
    <div class="card">
        <h2 id="lib-title">📚 المرجع التعليمي</h2>
        <div id="ex-list"></div>
        <p style="color:var(--accent); font-size:0.8rem;">* تأكد من الوقوف بشكل جانبي للكاميرا لتحليل دقيق.</p>
        <button onclick="startAI()">ابدأ المراقبة الحية 🎥</button>
    </div>
</div>

<div id="p3" class="page">
    <div class="video-box">
        <div id="hud" class="hud">جاري المعايرة الجانبية...</div>
        <video id="video-input"></video>
        <canvas id="output-canvas"></canvas>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
        <div class="card" style="padding:10px; text-align:center;">العداد: <b id="count">0</b></div>
        <div class="card" style="padding:10px; text-align:center;">الزاوية: <b id="angle">0°</b></div>
    </div>
    <button style="background:var(--danger);" onclick="location.reload()">إنهاء</button>
</div>

<script>
    const exercises = {
        'disc': [{n:'McKenzie Extension', d:'فرد الظهر للخلف لتخفيف الضغط.'}, {n:'Prone Prop Up', d:'الاستلقاء على البطن مع رفع الصدر.'}],
        'stenosis': [{n:'Pelvic Tilt', d:'تقليل تقوس الظهر لتوسيع القناة.'}, {n:'Knees to Chest', d:'ضم الركب للصدر لراحة الأعصاب.'}],
        'sciatica': [{n:'Nerve Gliding', d:'تحريك العصب بلطف لفك الالتصاقات.'}, {n:'Hamstring Stretch', d:'إطالة عضلات الفخذ الخلفية.'}]
    };

    let mode = ''; let count = 0; let stage = null;

    function showLibrary() {
        mode = document.getElementById('back-type').value;
        const list = document.getElementById('ex-list');
        list.innerHTML = '';
        (exercises[mode] || exercises['disc']).forEach(ex => {
            list.innerHTML += `<div class="lib-item"><b>${ex.n}</b><br><small>${ex.d}</small></div>`;
        });
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p2').classList.add('active');
    }

    function startAI() {
        document.getElementById('p2').classList.remove('active');
        document.getElementById('p3').classList.add('active');
        initPose();
    }

    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: false, minDetectionConfidence: 0.5 }); // إعدادات السرعة القصوى

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        drawConnectors(canvasCtx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});
        
        const lm = res.poseLandmarks;
        const hud = document.getElementById('hud');
        // تحليل جانبي (كتف 12 - حوض 24 - ركبة 26)
        let ang = calculateAngle(lm[12], lm[24], lm[26]);
        document.getElementById('angle').innerText = Math.round(ang) + "°";

        if (mode === 'disc') {
            if (ang < 150) { 
                hud.innerText = "🚨 انحناء خطر للأمام!"; hud.style.color = "red"; 
            } else { 
                hud.innerText = "وضعية ممتازة للديسك ✅"; hud.style.color = "#38bdf8";
                if (ang > 170) stage = "down";
                if (ang < 160 && stage === "down") { stage = "up"; count++; }
            }
        }
        document.getElementById('count').innerText = count;
        canvasCtx.restore();
    });

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
        let ang = Math.abs(r * 180 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }

    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function initPose() {
        new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 480, height: 360 // تقليل الجودة لزيادة السرعة
        }).start();
    }async function initPose() {
    try {
        const cam = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 480, height: 360
        });
        await cam.start();
        console.log("Camera started successfully");
    } catch (err) {
        alert("خطأ في فتح الكاميرا: " + err.message);
    }
}

</script>
</body>
</html>
