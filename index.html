<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaia-Style AI Physio | نظام التأهيل الذكي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --kaia-blue: #0052cc; --dark: #0a0a0a; --panel: #1a1a1a;
            --success: #00c853; --warning: #ffd600; --danger: #ff1744;
        }
        
        body { 
            background: var(--dark); color: white; font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* واجهة الكاميرا الاحترافية */
        .viewport { 
            position: relative; flex-grow: 1; background: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        #video-input { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output-canvas { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); }

        /* لوحة التحكم الجانبية (مثل Kaia) */
        .side-panel {
            position: absolute; left: 20px; top: 20px; bottom: 20px;
            width: 280px; background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(10px); border-radius: 24px;
            padding: 24px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }

        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: var(--kaia-blue); }
        
        /* شريط التنبيهات العلوي */
        .alert-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 40px; border-radius: 50px; font-weight: bold;
            font-size: 18px; transition: 0.3s; z-index: 10;
        }

        .btn-end {
            background: var(--danger); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: auto;
        }

        /* شاشة البداية */
        #splash {
            position: fixed; inset: 0; background: var(--dark);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
    </style>
</head>
<body>

<div id="splash">
    <div style="max-width: 400px; text-align: center;">
        <h1 style="color: var(--kaia-blue);">Kaia AI Physio</h1>
        <p>مرحباً بك في جلسة التأهيل الذكية. يرجى اختيار نوع الألم المكتشف:</p>
        <select id="protocol" style="width: 100%; padding: 15px; border-radius: 12px; margin: 20px 0; background: #222; color: white;">
            <option value="disc">ألم يزداد عند الانحناء (الديسك)</option>
            <option value="stenosis">ألم يزداد عند الوقوف (تضيق القناة)</option>
        </select>
        <button onclick="startSession()" style="background: var(--kaia-blue); color: white; width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer;">بدء التمرين الآن</button>
    </div>
</div>

<div class="viewport">
    <div id="alert" class="alert-bar" style="background: var(--success);">استعد للبدء...</div>
    
    <div class="side-panel">
        <h3 id="ex-name" style="margin:0">تمرين فرد الظهر</h3>
        <p style="font-size: 12px; color: #888;">حافظ على ثبات حوضك</p>
        
        <div class="stat-card">
            <div style="font-size: 12px;">التكرارات</div>
            <div id="reps" class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <div style="font-size: 12px;">دقة الحركة</div>
            <div id="accuracy" class="stat-value">--</div>
        </div>

        <button class="btn-end" onclick="location.reload()">إنهاء الجلسة</button>
    </div>

    <video id="video-input"></video>
    <canvas id="output-canvas"></canvas>
</div>

<script>
    let protocol = 'disc';
    let reps = 0;
    let stage = 'down';
    let synth = window.speechSynthesis;

    function speak(text) {
        if (synth.speaking) return;
        let utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ar-SA';
        synth.speak(utter);
    }

    function startSession() {
        protocol = document.getElementById('protocol').value;
        document.getElementById('splash').style.display = 'none';
        speak("تم تفعيل بروتوكول التأهيل. قف بشكل جانبي للكاميرا.");
        initAI();
    }

    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5 });

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        const ctx = canvasCtx;
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        const lm = res.poseLandmarks;
        const side = lm[12].visibility > lm[11].visibility ? {s:12, h:24, k:26} : {s:11, h:23, k:25};
        const angle = calculateAngle(lm[side.s], lm[side.h], lm[side.k]);
        
        // رسم النقاط بأسلوب Kaia (تغيير اللون بناءً على الدقة)
        let color = "#00c853"; // أخضر
        const alertBox = document.getElementById('alert');

        if (protocol === 'disc' && angle < 155) {
            color = "#ff1744"; // أحمر
            alertBox.innerText = "🚨 ارجع للخلف! ظهرك منحني";
            alertBox.style.background = "var(--danger)";
            speak("انتبه، لا تنحنِ للأمام");
        } else {
            alertBox.innerText = "وضعية ممتازة ✅";
            alertBox.style.background = "var(--success)";
            
            // منطق العداد
            if (angle > 175) stage = "down";
            if (angle < 165 && stage === "down") { 
                reps++; 
                stage = "up"; 
                document.getElementById('reps').innerText = reps;
                speak(reps.toString());
            }
        }

        drawConnectors(ctx, lm, POSE_CONNECTIONS, {color: color, lineWidth: 4});
        drawLandmarks(ctx, [lm[side.s], lm[side.h], lm[side.k]], {color: '#fff', lineWidth: 2, radius: 5});
        
        document.getElementById('accuracy').innerText = Math.round(angle) + "°";
    });

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
        let ang = Math.abs(r * 180 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }

    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function initAI() {
        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    }
</script>
</body>
</html>
