<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Physio Pro - Web Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .canvas-container { position: relative; width: 100%; max-width: 800px; margin: auto; border-radius: 20px; overflow: hidden; border: 4px solid #1e293b; }
        canvas { width: 100%; height: auto; }
        video { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center mb-8">
        <h1 class="text-4xl font-bold text-blue-400">AI Physio Pro</h1>
        <p class="text-gray-400 mt-2">نظام التأهيل المنزلي الذكي</p>
    </header>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <div class="canvas-container shadow-2xl">
                <canvas id="output_canvas"></canvas>
                <video id="input_video"></video>
            </div>
            
            <div class="flex gap-4 mt-6">
                <button onclick="changeExercise('elbow')" class="flex-1 bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition">تمرين الكوع</button>
                <button onclick="changeExercise('shoulder')" class="flex-1 bg-slate-700 hover:bg-slate-600 p-4 rounded-xl font-bold transition">تمرين الكتف</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-blue-300 text-center">العداد الرقمي</h2>
                <div class="text-center">
                    <span id="counter" class="text-8xl font-black text-white">0</span>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <h3 class="text-lg font-bold mb-2">زاوية المفصل الحالية</h3>
                <div id="angle_display" class="text-3xl font-bold text-yellow-400">0°</div>
            </div>

            <div id="feedback_box" class="bg-blue-900/30 p-6 rounded-3xl border border-blue-500/50 text-center">
                <p id="feedback_text" class="text-xl font-bold">جاهز للبدء...</p>
            </div>

            <button onclick="downloadReport()" class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold shadow-lg transition">تصدير تقرير الجلسة (CSV)</button>
        </div>
    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        let counter = 0;
        let stage = "down";
        let currentExercise = "elbow";
        let history = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        function changeExercise(ex) {
            currentExercise = ex;
            counter = 0;
            document.getElementById('counter').innerText = counter;
            speak("تم تغيير التمرين");
        }

        function calculateAngle(A, B, C) {
            let radians = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                
                // تحديد النقاط
                const shoulder = landmarks[12]; // الكتف الأيمن
                const elbow = landmarks[14];    // الكوع الأيمن
                const wrist = landmarks[16];    // الرسغ الأيمن
                const hip = landmarks[24];      // الحوض الأيمن

                let angle = 0;
                if (currentExercise === "elbow") {
                    angle = calculateAngle(shoulder, elbow, wrist);
                } else {
                    angle = calculateAngle(hip, shoulder, elbow);
                }

                document.getElementById('angle_display').innerText = Math.round(angle) + "°";

                // منطق العد
                if (angle > 160) {
                    if (stage === "up") {
                        counter++;
                        document.getElementById('counter').innerText = counter;
                        speak(counter);
                        history.push({time: new Date().toLocaleTimeString(), count: counter});
                    }
                    stage = "down";
                    document.getElementById('feedback_text').innerText = "حركة صحيحة ✅";
                }
                if (angle < 40) {
                    stage = "up";
                    document.getElementById('feedback_text').innerText = "افرد المفصل الآن";
                }

                // رسم الهيكل العظمي
                drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#3b82f6', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
            }
            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        function downloadReport() {
            let csvContent = "data:text/csv;charset=utf-8,Time,Repetition\n";
            history.forEach(row => {
                csvContent += `${row.time},${row.count}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "physio_report.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>
</html>
