<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Physio Elite | نظام التأهيل الشامل</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #38bdf8; --bg: #020617; --panel: #0f172a; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; }
        .page { display: none; max-width: 900px; margin: auto; animation: fadeIn 0.4s; }
        .active { display: block; }
        .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; }
        
        /* تصميم الكاميرا والشرح */
        .exercise-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .video-box { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid var(--accent); }
        #video-input { width: 100%; height: 450px; object-fit: cover; transform: scaleX(-1); }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .info-panel { background: #1e293b; padding: 20px; border-radius: 20px; border-right: 5px solid var(--accent); }
        .how-to { background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }
        
        select, input, button { width: 100%; padding: 15px; border-radius: 12px; margin: 8px 0; font-size: 16px; border: 1px solid #334155; }
        button { background: var(--accent); color: var(--bg); font-weight: bold; cursor: pointer; border: none; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p1" class="page active">
    <div class="card">
        <h2>📋 بيانات المريض والتشخيص</h2>
        <input type="text" id="p-name" placeholder="اسم المريض بالكامل">
        <input type="number" id="p-age" placeholder="السن">
        
        <label>منطقة الإصابة:</label>
        <select id="p-zone" onchange="loadEx()">
            <option value="">-- اختر المنطقة --</option>
            <option value="neck">الرقبة (Neck)</option>
            <option value="shoulder">الكتف (Shoulder)</option>
            <option value="elbow">الكوع (Elbow)</option>
            <option value="back">أعلى الظهر والصدر</option>
        </select>
        
        <label>التمرين المقترح:</label>
        <select id="p-ex-select"></select>
        
        <button onclick="startSession()">بدء الكاميرا والتمرين 🎥</button>
    </div>
</div>

<div id="p2" class="page">
    <div class="exercise-grid">
        <div class="video-box">
            <video id="video-input" autoplay playsinline></video>
            <canvas id="output-canvas"></canvas>
            <div id="hud" style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:10px; border-radius:10px;">
                العداد: <span id="rep-count" style="color:var(--accent); font-weight:bold;">0</span>
            </div>
        </div>
        
        <div class="info-panel">
            <h3 id="ex-name" style="color:var(--accent); margin-top:0;">--</h3>
            <div class="how-to">
                <strong>📝 طريقة الأداء:</strong>
                <p id="ex-way">--</p>
                <hr style="border:0; border-top:1px solid #334155;">
                <p id="ex-dose" style="color:var(--success); font-weight:bold;"></p>
            </div>
            <button onclick="location.reload()" style="background:#475569; color:white; margin-top:20px;">إنهاء الجلسة</button>
        </div>
    </div>
</div>

<script>
    // قاعدة البيانات الكاملة للتمارين
    const exercises = {
        neck: [
            {n: "Neck Retraction (سحب الذقن)", w: "اسحب ذقنك للخلف كأنك تعمل (double chin) بدون تنزيل الرأس، ثبت 5 ثواني ثم ارخي.", d: "10-15 تكرار"},
            {n: "Neck Flexion (ثني الرقبة)", w: "انزل رأسك للأمام ببطء حتى يلمس الذقن الصدر ثم ارجع ببطء.", d: "15 تكرار"}
        ],
        shoulder: [
            {n: "Wall Climbing (تسلق الحائط)", w: "ارفع يدك على الحائط وتسلق بأصابعك للأعلى ببطء ثم انزل.", d: "10 تكرارات"}
        ],
        back: [
            {n: "Scapular Retraction (ضم الكتف)", w: "اسحب الكتفين للخلف كأنك تضم لوحي الكتف معاً، ثبت 5 ثواني.", d: "15 تكرار"}
        ]
    };

    function loadEx() {
        const zone = document.getElementById('p-zone').value;
        const sel = document.getElementById('p-ex-select');
        sel.innerHTML = '';
        if(exercises[zone]) {
            exercises[zone].forEach((e, i) => sel.innerHTML += `<option value="${i}">${e.n}</option>`);
        }
    }

    let reps = 0;
    let stage = 'start';
    let synth = window.speechSynthesis;

    function speak(t) { 
        if(synth.speaking) return;
        let u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; synth.speak(u); 
    }

    function startSession() {
        const zone = document.getElementById('p-zone').value;
        const idx = document.getElementById('p-ex-select').value;
        if(!zone) return alert("اختر المنطقة أولاً");

        const ex = exercises[zone][idx];
        document.getElementById('ex-name').innerText = ex.n;
        document.getElementById('ex-way').innerText = ex.w;
        document.getElementById('ex-dose').innerText = "الجرعة المقترحة: " + ex.d;

        document.getElementById('p1').classList.remove('active');
        document.getElementById('p2').classList.add('active');
        
        speak("تم تفعيل الكاميرا. ابدأ تمرين " + ex.n);
        initCamera();
    }

    // إعداد الكاميرا والذكاء الاصطناعي
    const video = document.getElementById('video-input');
    const canvas = document.getElementById('output-canvas');
    const ctx = canvas.getContext('2d');

    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});

        // عد التكرارات بناءً على زاوية الجذع (مثال بسيط)
        const lm = res.poseLandmarks;
        const shoulder = lm[11], hip = lm[23], knee = lm[25];
        let angle = Math.abs((Math.atan2(knee.y-hip.y, knee.x-hip.x) - Math.atan2(shoulder.y-hip.y, shoulder.x-hip.x)) * 180 / Math.PI);
        if (angle > 180) angle = 360 - angle;

        if (angle < 160) {
            if (stage === 'start') {
                reps++;
                document.getElementById('rep-count').innerText = reps;
                speak(reps.toString());
                stage = 'end';
            }
        } else { stage = 'start'; }
    });

    async function initCamera() {
        const camera = new Camera(video, {
            onFrame: async () => { await pose.send({image: video}); },
            width: 640, height: 480
        });
        camera.start();
    }
</script>
</body>
</html>
