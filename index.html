<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Physio Elite | نظام التأهيل الشامل</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #38bdf8; --bg: #020617; --card: #0f172a; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .page { display: none; max-width: 800px; margin: auto; animation: fadeIn 0.3s; }
        .active { display: block; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; }
        select, button { width: 100%; padding: 15px; border-radius: 12px; margin: 10px 0; font-size: 16px; cursor: pointer; }
        button { background: var(--accent); color: var(--bg); font-weight: bold; border: none; }
        .camera-container { position: relative; border-radius: 20px; overflow: hidden; background: #000; aspect-ratio: 4/3; border: 2px solid var(--accent); }
        #video-input { width: 100%; height: 100%; transform: scaleX(-1); }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); padding: 10px 20px; border-radius: 10px; border: 1px solid var(--accent); width: 80%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p-select" class="page active">
    <div class="card">
        <h1>AI-Physio Elite 🦾</h1>
        <p>اختر منطقة الإصابة لتفعيل بروتوكول الذكاء الاصطناعي الخاص بها:</p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button onclick="setZone('upper')">الجزء العلوي (الرقبة والكتف)</button>
            <button onclick="setZone('lower')">الجزء السفلي (أسفل الظهر)</button>
        </div>
    </div>
</div>

<div id="p-diag" class="page">
    <div class="card">
        <h2 id="diag-title">تشخيص الحالة</h2>
        <div id="diag-options"></div>
        <button onclick="startAI()">بدء المراقبة الحية 🎥</button>
    </div>
</div>

<div id="p-cam" class="page">
    <div class="camera-container">
        <div id="hud" class="hud">جاري تحليل الحركة...</div>
        <video id="video-input"></video>
        <canvas id="output-canvas"></canvas>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <div class="card" style="flex: 1; margin: 0;">العداد: <br><b id="count" style="font-size: 24px; color: var(--accent);">0</b></div>
        <div class="card" style="flex: 1; margin: 0;">الزاوية الحالية: <br><b id="angle-val" style="font-size: 24px; color: var(--accent);">0°</b></div>
    </div>
    <button style="background: var(--danger); color: white; margin-top: 15px;" onclick="location.reload()">إنهاء الجلسة</button>
</div>

<script>
    let zone = ''; // upper or lower
    let subType = '';
    let reps = 0;
    let stage = 'start';
    let synth = window.speechSynthesis;

    function setZone(z) {
        zone = z;
        const diagTitle = document.getElementById('diag-title');
        const diagOptions = document.getElementById('diag-options');
        
        if (zone === 'upper') {
            diagTitle.innerText = "إصابات الجزء العلوي";
            diagOptions.innerHTML = `
                <select id="sub-type">
                    <option value="neck">ميلان الرقبة للأمام (Text Neck)</option>
                    <option value="shoulder">تقوس الكتفين (Rounded Shoulders)</option>
                </select>
            `;
        } else {
            diagTitle.innerText = "إصابات الجزء السفلي";
            diagOptions.innerHTML = `
                <select id="sub-type">
                    <option value="disc">ألم يزداد عند الانحناء (الديسك)</option>
                    <option value="stenosis">ألم عند الوقوف (تضيق القناة)</option>
                </select>
            `;
        }
        document.getElementById('p-select').classList.remove('active');
        document.getElementById('p-diag').classList.add('active');
    }

    function speak(text) {
        if (synth.speaking) return;
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        synth.speak(msg);
    }

    function startAI() {
        subType = document.getElementById('sub-type').value;
        document.getElementById('p-diag').classList.remove('active');
        document.getElementById('p-cam').classList.add('active');
        speak("بدء الجلسة. قف بشكل جانبي للكاميرا.");
        initAI();
    }

    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5 });

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        const lm = res.poseLandmarks;
        const hud = document.getElementById('hud');
        let currentAngle = 0;

        // منطق "الوكيل الذكي" بناءً على المنطقة المحددة
        if (subType === 'neck') {
            // قياس زاوية الرقبة (الأذن - الكتف - خط مستقيم)
            currentAngle = calculateAngle(lm[7], lm[11], {x: lm[11].x, y: lm[11].y - 0.1});
            if (currentAngle > 30) {
                hud.innerText = "🚨 ارفع رأسك! الرقبة مائلة للأمام";
                hud.style.color = "var(--danger)";
                speak("ارفع رأسك");
            } else {
                hud.innerText = "وضعية الرقبة سليمة ✅";
                hud.style.color = "var(--success)";
            }
        } else if (subType === 'disc') {
            // قياس زاوية الظهر (كتف - حوض - ركبة)
            currentAngle = calculateAngle(lm[11], lm[23], lm[25]);
            if (currentAngle < 155) {
                hud.innerText = "🚨 انتبه! ظهرك منحني للأمام";
                hud.style.color = "var(--danger)";
                speak("استقم");
            } else {
                hud.innerText = "وضعية الظهر سليمة ✅";
                hud.style.color = "var(--success)";
                if (currentAngle > 175) stage = "ready";
                if (currentAngle < 165 && stage === "ready") { reps++; stage = "done"; speak(reps.toString()); }
            }
        }

        document.getElementById('angle-val').innerText = Math.round(currentAngle) + "°";
        document.getElementById('count').innerText = reps;
        drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#38bdf8', lineWidth: 2});
    });

    function calculateAngle(a, b, c) {
        let r = Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x);
        let ang = Math.abs(r * 180 / Math.PI);
        return ang > 180 ? 360 - ang : ang;
    }

    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function initAI() {
        new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        }).start();
    }
</script>
</body>
</html>
