<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مراقبة العلاج الطبيعي الذكي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; background: #000; border-radius: 10px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #video-input { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        .stats-panel { margin-top: 20px; display: flex; justify-content: space-around; background: #ecf0f1; padding: 15px; border-radius: 8px; }
        .stat-box { font-size: 1.2rem; font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>مراقب التمارين الذكي 🤖</h1>
    <p>قف أمام الكاميرا لبدء تحليل الحركة وتصحيح التمارين</p>

    <div class="video-container">
        <video id="video-input"></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div class="stats-panel">
        <div class="stat-box">الحالة: <span id="status">جاري التحميل...</span></div>
        <div class="stat-box">دقة الوضعية: <span id="accuracy">0%</span></div>
    </div>
</div>

<script>
    const videoElement = document.getElementById('video-input');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');
    const accuracyText = document.getElementById('accuracy');

    // إعدادات مكتبة Pose
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // دالة المعالجة والرسم
    function onResults(results) {
        if (!results.poseLandmarks) {
            statusText.innerText = "لم يتم اكتشاف جسم";
            return;
        }

        statusText.innerText = "يتم التتبع بنجاح ✅";
        accuracyText.innerText = (results.poseLandmarks[0].visibility * 100).toFixed(0) + "%";

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // رسم الهيكل العظمي
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
        canvasCtx.restore();
    }

    pose.onResults(onResults);

    // تشغيل الكاميرا
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await pose.send({image: videoElement});
        },
        width: 640,
        height: 480
    });
    camera.start();

    // ضبط حجم الكانفس ليتطابق مع الفيديو
    videoElement.addEventListener('loadedmetadata', () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
    });
</script>

</body>
</html>
