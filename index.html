<!DOCTYPE html>
<html>
<head>
  <title>AI Physio AI Tracking</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: #f4f7fb;
    }

    header {
      background: #1f4e79;
      color: white;
      padding: 15px;
    }

    video, canvas {
      width: 90%;
      max-width: 600px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .container {
      position: relative;
      display: inline-block;
    }
  </style>
</head>

<body>

<header>
  <h2>💪 AI Physiotherapy Pose Detection</h2>
</header>

<button onclick="startCamera()">Start AI Camera</button>

<div class="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>
let videoElement = document.getElementById("video");
let canvasElement = document.getElementById("canvas");
let ctx = canvasElement.getContext("2d");

async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  videoElement.srcObject = stream;

  videoElement.onloadedmetadata = () => {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
  };

  const pose = new Pose.Pose({
    locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
    }
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await pose.send({ image: videoElement });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

function onResults(results) {

  ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  if (results.poseLandmarks) {
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: 'green' });
    drawLandmarks(ctx, results.poseLandmarks, { color: 'red' });
  }
}
</script>

</body>
</html>
